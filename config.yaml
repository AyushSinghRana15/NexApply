platforms:
  linkedin: true
  indeed: true
  naukri: true
  internshala: true

polling_interval_seconds: 30

filters:
  titles: ["Software Engineer", "Backend Developer", "SDE", "Python Developer"]
  locations: ["Remote", "Delhi", "Bangalore", "Mumbai"]
  exclude_keywords: ["10+ years", "only C++"]

tailor:
  min_match_score: 60
  groq_model: "llama-3.3-70b-versatile"
  ollama_model: "mistral"
  ollama_host: "http://localhost:11434"
  groq_timeout_seconds: 8
  use_llm: true

profile:
  categories: ["engineering", "data", "product", "devops", "design", "ml"]

fleet:
  max_concurrent_browsers: 3
  headless: true
  page_timeout_seconds: 30
  human_delay_min: 0.5
  human_delay_max: 1.2
  resume_format: "txt"

guard:
  review_timeout_seconds: 300
  max_pending_reviews: 3
  dashboard_port: 8000
  auto_skip_below_score: 60
