indeed:
  first_name:
    - input[name="first_name"]
    - input[id*="first"]
    - input[placeholder*="First"]
  last_name:
    - input[name="last_name"]
    - input[id*="last"]
    - input[placeholder*="Last"]
  email:
    - input[name="email"]
    - input[type="email"]
    - input[placeholder*="Email"]
  phone:
    - input[name="phone"]
    - input[type="tel"]
    - input[placeholder*="Phone"]
  submit_button:
    - button[type="submit"]
    - button:has-text("Apply")
    - button[data-testid*="submit"]
    - input[type="submit"]
  resume_upload:
    - input[type="file"]
  cover_letter:
    - textarea[name="cover_letter"]
    - textarea[placeholder*="cover"]
    - textarea[id*="cover"]

naukri:
  apply_button:
    - button:has-text("Apply")
    - button[class*="apply"]
    - a[class*="apply"]
  cover_letter:
    - textarea[class*="cover"]
    - textarea[id*="cover"]
    - textarea[placeholder*="cover"]
  notice_period:
    - input[name="noticePeriod"]
    - select[name="noticePeriod"]
    - input[placeholder*="notice"]
  current_ctc:
    - input[name="currentCtc"]
    - input[placeholder*="current"]
    - input[name="currCTC"]
  expected_ctc:
    - input[name="expectedCtc"]
    - input[placeholder*="expected"]
    - input[name="expCTC"]
  submit_button:
    - button:has-text("Send")
    - button:has-text("Apply")
    - button[type="submit"]
  resume_upload:
    - input[type="file"]

internshala:
  cover_letter:
    - textarea[name="cover_letter"]
    - textarea[class*="cover"]
    - textarea[placeholder*="cover"]
  availability:
    - select[name="availability"]
    - input[name*="avail"]
    - select[id*="avail"]
  resume_upload:
    - input[type="file"]
  submit_button:
    - button:has-text("Submit")
    - button[type="submit"]
  job_title:
    - h2.job-internship-name a.job-title-href
    - a[class*="title"]
  company_name:
    - .internship_logo img
  location:
    - .locations
    - .row-1-item.locations
