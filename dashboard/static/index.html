<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexApply — Review Queue</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; overflow: hidden; }
#root { height: 100vh; display: flex; flex-direction: column; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #1e293b; }
.topbar h1 { font-size: 18px; font-weight: 600; color: #94a3b8; letter-spacing: 0.5px; }
.topbar h1 span { color: #38bdf8; }
.badge { background: #1e293b; color: #94a3b8; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.badge.active { background: #38bdf8; color: #0f172a; }
.content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
.card { display: flex; width: 100%; max-width: 1100px; height: 520px; background: #1e293b; border-radius: 16px; overflow: hidden; animation: slideIn 0.4s ease-out; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
@keyframes slideIn { from { transform: translateX(80px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-80px); opacity: 0; } }
.card.exiting { animation: slideOut 0.3s ease-in forwards; }
.panel-left { width: 40%; padding: 32px; display: flex; flex-direction: column; border-right: 1px solid #334155; }
.panel-left .meta { display: flex; gap: 8px; margin-bottom: 8px; }
.panel-left .meta span { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; padding: 2px 8px; background: #0f172a; border-radius: 4px; }
.panel-left h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #f1f5f9; }
.panel-left .company { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }
.score-section { margin-bottom: 20px; }
.score-section .score-label { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 6px; }
.score-bar { height: 8px; background: #0f172a; border-radius: 4px; overflow: hidden; }
.score-bar .fill { height: 100%; border-radius: 4px; transition: width 0.8s ease-out; }
.score-bar .fill.green { background: #22c55e; }
.score-bar .fill.yellow { background: #eab308; }
.score-bar .fill.red { background: #ef4444; }
.details { flex: 1; }
.detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e293b; font-size: 13px; }
.detail-row .label { color: #64748b; }
.detail-row .value { color: #e2e8f0; font-weight: 500; }
.keywords { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.keyword { background: #0f172a; color: #38bdf8; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; }
.panel-right { width: 60%; display: flex; flex-direction: column; }
.panel-right .screenshot-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #0f172a; overflow: hidden; position: relative; }
.panel-right .screenshot-area img { max-width: 100%; max-height: 100%; object-fit: contain; }
.panel-right .screenshot-area .placeholder { color: #475569; font-size: 14px; }
.panel-right .variant-badge { position: absolute; top: 12px; right: 12px; background: #1e293b; color: #94a3b8; padding: 4px 10px; border-radius: 6px; font-size: 11px; }
.actions { display: flex; gap: 8px; padding: 16px; background: #0f172a; }
.actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
.actions button:hover { opacity: 0.9; transform: translateY(-1px); }
.actions button:active { transform: translateY(0); }
.btn-approve { background: #22c55e; color: #052e16; }
.btn-edit { background: #eab308; color: #422006; }
.btn-skip { background: #ef4444; color: #450a0a; }
.actions .countdown { display: flex; align-items: center; justify-content: center; font-size: 12px; color: #64748b; min-width: 100px; }
.actions .countdown.warning { color: #ef4444; font-weight: 600; }
.shortcut-hint { font-size: 10px; color: #475569; display: block; margin-top: 2px; }
.empty-state { text-align: center; }
.empty-state .dot { width: 12px; height: 12px; background: #38bdf8; border-radius: 50%; margin: 0 auto 16px; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
.empty-state h2 { font-size: 18px; color: #64748b; font-weight: 400; }
.empty-state p { font-size: 13px; color: #475569; margin-top: 8px; }
@media (max-width: 768px) {
  .card { flex-direction: column; height: auto; max-height: 90vh; }
  .panel-left { width: 100%; border-right: none; border-bottom: 1px solid #334155; }
  .panel-right { width: 100%; min-height: 300px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function() {
  const { createElement: h, useState, useEffect, useCallback, useRef } = React;

  function getColor(score) {
    return score >= 75 ? 'green' : score >= 51 ? 'yellow' : 'red';
  }

  function EmptyState() {
    return h('div', { className: 'empty-state' },
      h('div', { className: 'dot' }),
      h('h2', null, 'Watching for applications...'),
      h('p', null, 'RadarAgent is scanning job platforms. A review card will appear here automatically.')
    );
  }

  function ReviewCard({ job, onDecision, countdown }) {
    const [exiting, setExiting] = React.useState(false);
    const [barWidth, setBarWidth] = React.useState(0);

    React.useEffect(() => {
      requestAnimationFrame(function() { setBarWidth(job.match_score); });
    }, [job.job_id]);

    const act = React.useCallback(function(action) {
      setExiting(true);
      setTimeout(function() { onDecision(job.job_id, action); }, 300);
    }, [job.job_id, onDecision]);

    var cw = countdown <= 60;
    var min = Math.floor(countdown / 60);
    var sec = countdown % 60;
    var color = getColor(job.match_score);

    return h('div', { className: 'card' + (exiting ? ' exiting' : '') },
      h('div', { className: 'panel-left' },
        h('div', { className: 'meta' },
          h('span', null, job.platform),
          h('span', null, job.resume_variant)
        ),
        h('h2', null, job.title),
        h('div', { className: 'company' }, job.company),
        h('div', { className: 'score-section' },
          h('div', { className: 'score-label' },
            h('span', null, 'Match Score'),
            h('span', null, job.match_score + '/100')
          ),
          h('div', { className: 'score-bar' },
            h('div', { className: 'fill ' + color, style: { width: barWidth + '%' } })
          )
        ),
        h('div', { className: 'details' },
          h('div', { className: 'detail-row' },
            h('span', { className: 'label' }, 'Posted'),
            h('span', { className: 'value' }, job.posted_ago)
          ),
          h('div', { className: 'detail-row' },
            h('span', { className: 'label' }, 'Variant'),
            h('span', { className: 'value' }, job.resume_variant)
          )
        ),
        h('div', { className: 'keywords' },
          job.keywords.map(function(kw, i) {
            return h('span', { key: i, className: 'keyword' }, kw);
          })
        )
      ),
      h('div', { className: 'panel-right' },
        h('div', { className: 'screenshot-area' },
          job.screenshot_url
            ? h('img', { src: job.screenshot_url, alt: 'Application screenshot' })
            : h('div', { className: 'placeholder' }, 'No screenshot available'),
          h('span', { className: 'variant-badge' }, job.resume_variant)
        ),
        h('div', { className: 'actions' },
          h('button', { className: 'btn-approve', onClick: function() { act('APPROVE'); } },
            'APPROVE', h('span', { className: 'shortcut-hint' }, 'A')
          ),
          h('button', { className: 'btn-edit', onClick: function() { act('EDIT'); } },
            'EDIT', h('span', { className: 'shortcut-hint' }, 'E')
          ),
          h('button', { className: 'btn-skip', onClick: function() { act('SKIP'); } },
            'SKIP', h('span', { className: 'shortcut-hint' }, 'S')
          ),
          h('div', { className: 'countdown' + (cw ? ' warning' : '') },
            countdown > 0
              ? 'Auto-skip in ' + min + ':' + (sec < 10 ? '0' : '') + sec
              : 'Timeout'
          )
        )
      )
    );
  }

  function App() {
    var jobState = useState(null);
    var currentJob = jobState[0];
    var setCurrentJob = jobState[1];
    var cdState = useState(300);
    var countdown = cdState[0];
    var setCountdown = cdState[1];
    var wsRef = useRef(null);

    useEffect(function() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var ws = new WebSocket(proto + '//' + location.host + '/ws');
      wsRef.current = ws;

      ws.onopen = function() { console.log('WS connected'); };
      ws.onclose = function() {
        console.log('WS disconnected, reconnecting...');
        setTimeout(function() {
          var p = location.protocol === 'https:' ? 'wss:' : 'ws:';
          wsRef.current = new WebSocket(p + '//' + location.host + '/ws');
        }, 2000);
      };
      ws.onmessage = function(event) {
        try {
          var msg = JSON.parse(event.data);
          if (msg.type === 'NEW_REVIEW') { setCountdown(300); setCurrentJob(msg.payload); }
          else if (msg.type === 'COUNTDOWN') { setCountdown(msg.seconds_remaining); }
          else if (msg.type === 'CLEARED') { setCurrentJob(null); setCountdown(300); }
        } catch(e) { console.error('WS error:', e); }
      };

      return function() { ws.close(); };
    }, []);

    var sendDecision = useCallback(function(jobId, action) {
      var ws = wsRef.current;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'DECISION', job_id: jobId, action: action }));
      }
    }, []);

    var handleDecision = useCallback(function(jobId, action) {
      setCurrentJob(null);
      setCountdown(300);
      sendDecision(jobId, action);
    }, [sendDecision]);

    useEffect(function() {
      var handler = function(e) {
        if (!currentJob) return;
        var key = e.key.toUpperCase();
        if (key === 'A') handleDecision(currentJob.job_id, 'APPROVE');
        else if (key === 'S') handleDecision(currentJob.job_id, 'SKIP');
        else if (key === 'E') handleDecision(currentJob.job_id, 'EDIT');
      };
      window.addEventListener('keydown', handler);
      return function() { window.removeEventListener('keydown', handler); };
    }, [currentJob, handleDecision]);

    return h('div', { className: 'topbar' },
      h('div', null,
        h('h1', null, 'Nex', h('span', null, 'Apply'), ' — Review Queue')
      ),
      h('span', { className: 'badge' + (currentJob ? ' active' : '') },
        currentJob ? '1 pending' : 'idle'
      ),
      h('div', { className: 'content' },
        currentJob
          ? h(ReviewCard, { job: currentJob, onDecision: handleDecision, countdown: countdown })
          : h(EmptyState, null)
      )
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(h(App));
})();
</script>
</body>
</html>
